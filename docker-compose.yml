services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studio_secret_2026}
      POSTGRES_DB: carefree_studio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d carefree_studio"]
      interval: 5s
      timeout: 3s
      retries: 5

  studio-api:
    build:
      context: .
      dockerfile: apps/studio-api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://studio:${POSTGRES_PASSWORD:-studio_secret_2026}@postgres:5432/carefree_studio
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGINS: https://carefreelab.cloud,https://www.carefreelab.cloud,http://localhost:4000
      PORT: "3001"

volumes:
  pgdata:
